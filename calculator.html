<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <!-- Liquid Background Blobs -->
    <div class="background-blobs">
        <div class="blob shape1"></div>
        <div class="blob shape2"></div>
    </div>

    <!-- Glassmorphism Calculator -->
    <div class="calculator">
        <input type="text" class="display" id="display" disabled>
        <div class="buttons">
            <button class="operator" onclick="clearDisplay()">AC</button>
            <button class="operator" onclick="deleteLast()">DEL</button>
            <button class="operator" onclick="appendValue('%')">%</button>
            <button class="operator" onclick="appendValue('/')">/</button>
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">*</button>
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">-</button>
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            <button onclick="appendValue('00')">00</button>
            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button class="equal" onclick="calculateResult()">=</button>
        </div>
    </div>

    <!-- Watermark -->
    <div class="watermark">Created by Nitesh Goswami <br>
        Insta: @mr._goswami____ <br> Email: niteshgoswami72812@gmail.com <br>
        Phone: +919753856359 <br>
       Linkedin: https://www.linkedin.com/in/nitesh-goswami-b09324312/ <br>
       GitHub: niteshgoswami72812-create
    </div>
    
    <script src="calculator.js"></script>
</body>
</html>
